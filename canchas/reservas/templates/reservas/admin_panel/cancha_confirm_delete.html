{% extends 'reservas/base_admin.html' %}

{% block page_title %}Eliminar Cancha{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 40px auto;">
    <div class="card card-padded" style="text-align: center;">
        <div style="width: 56px; height: 56px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
            <svg style="width: 28px; height: 28px; color: var(--c-danger);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.9 12.1A2 2 0 0116.1 21H7.9a2 2 0 01-2-1.9L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </div>
        <h2 style="font-size: 18px; font-weight: 700; margin: 0 0 6px;">¿Eliminar {{ cancha.nombre }}?</h2>
        <p style="font-size: 13px; color: var(--c-text-muted); margin: 0 0 20px;">Esta acción no se puede deshacer. Se eliminarán todas las reservas asociadas.</p>

        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 8px; justify-content: center;">
                <a href="{% url 'admin_canchas' %}" class="btn-ghost">Cancelar</a>
                <button type="submit" class="btn-danger">Sí, eliminar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
