{% extends 'reservas/base_admin.html' %}
{% block page_title %}Eliminar par{% endblock %}
{% block content %}
<div style="max-width: 480px; margin: 0 auto;">
    <div class="card card-padded">
        <h2 style="margin: 0 0 8px;">¿Eliminar {{ guayo.codigo }}?</h2>
        <p style="color: var(--c-text-muted);">Si tiene alquileres históricos, no se eliminará. Considera marcarlo como "dado de baja" en su lugar.</p>
        <form method="post" style="display: flex; gap: 8px; margin-top: 16px;">
            {% csrf_token %}
            <a href="{% url 'admin_guayos' %}" class="btn-ghost">Cancelar</a>
            <button type="submit" class="btn-danger">Eliminar</button>
        </form>
    </div>
</div>
{% endblock %}
